# First-party court deadline rules.
#
# Fields:
#   id            – machine-readable identifier used in API calls
#   citation      – human-readable citation shown in UI and traces
#   deadline_type – one of: court_date | filing | statute_of_limitations |
#                   response_due | discovery_cutoff | internal
#   offset_days   – number of days to add to the trigger date
#   court_days    – if true, weekends and federal holidays are excluded from
#                   the count (FRCP 6(a)(1)); if false, calendar days are used
#                   but the last day is pushed to the next business day per
#                   FRCP 6(a)(1)(C)
#   version       – rule version string; bump when the underlying rule changes
#   jurisdiction  – "FRCP" or jurisdiction code (e.g. "CA", "ON")

# ---------------------------------------------------------------------------
# FRCP responses (Rule 12)
# ---------------------------------------------------------------------------

[[rules]]
id = "frcp_12_a_1"
citation = "FRCP 12(a)(1)"
deadline_type = "response_due"
offset_days = 21
court_days = false
version = "1"
jurisdiction = "FRCP"

# Response by the United States, a US agency, or a US officer sued in official
